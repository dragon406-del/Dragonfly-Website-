}

.card img{

    height:150px;

    border-radius:5px;
    display: flex;
    align-items: center;
}

.card h3{
    margin:15px 0;
    display: flex;
}

.card a{

    background:#28a745;

    padding:10px 20px;
    border-radius:5px;
    display: flex;
}

nav ul{

    align-items: center;
}

nav ul li{
    margin:0 20px;
    color:#F90000;

nav ul li a{

    font-size:18px;
    transition:0.3s;
    display: flex;
    align-items: center;
}

nav ul li a:hover{
    color:#FF0000;

hr{
